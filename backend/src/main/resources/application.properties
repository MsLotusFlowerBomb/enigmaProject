spring.application.name=propmate-backend
server.port=8080

# H2 in-memory database (development only - not for production use)
spring.datasource.url=jdbc:h2:mem:propmatedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.show-sql=false

# CORS: comma-separated list of allowed origins (override in production)
propmate.cors.allowed-origins=http://localhost:5173,http://localhost:3000
